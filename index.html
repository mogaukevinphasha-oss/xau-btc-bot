<!DOCTYPE html>
<html>
<head>
    <title>Phasha FX Bot Controller</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:Arial;">

    <h1>🔥 PHASHA FX BOT CONTROL 🔥</h1>

    <br>

    <button onclick="send('start')" style="padding:15px; font-size:18px;">START BOT</button>
    <br><br>

    <button onclick="send('stop')" style="padding:15px; font-size:18px;">STOP BOT</button>
    <br><br>

    <button onclick="send('buy')" style="padding:15px; font-size:18px;">BUY</button>
    <br><br>

    <button onclick="send('sell')" style="padding:15px; font-size:18px;">SELL</button>

    <br><br>

    <h3 id="status">Status: Waiting...</h3>

    <script>
        function send(action) {
            fetch('/' + action)
            .then(res => res.text())
            .then(data => {
                document.getElementById("status").innerText = "Status: " + data;
            })
        }
    </script>

</body>
</html>
